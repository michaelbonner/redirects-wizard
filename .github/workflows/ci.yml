name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: 0.1.24
          run-install: false

      - name: Check formatting
        run: vp fmt --check

      - name: Lint
        run: vp lint
