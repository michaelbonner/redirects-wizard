pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: "{*,**/*}.{ts,js,mjs,cjs}"
      run: |
        command -v vp >/dev/null 2>&1 || {
          echo "vp (Vite+) not found. Install it from https://viteplus.dev"
          exit 1
        }
        vp fmt --write {staged_files}
      stage_fixed: true
