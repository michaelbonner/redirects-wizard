services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-redirects_wizard}"
      POSTGRES_USER: "${POSTGRES_USER:-redirects_wizard}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-secret}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redirects_wizard}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
